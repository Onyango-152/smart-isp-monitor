name: smart_isp_monitor
description: Smart Mobile ISP Monitoring System

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client for API calls
  dio: ^5.4.0

  # State management
  provider: ^6.1.2

  # Charts for metrics and reports
  fl_chart: ^0.67.0

  # Local database for offline mode
  sqflite: ^2.3.2
  path: ^1.9.0

  # Push notifications
  flutter_local_notifications: ^17.0.0

  # Network connectivity detection
  connectivity_plus: ^6.0.3

  # Local key-value storage (for JWT token)
  shared_preferences: ^2.2.3

  # Dependency injection
  get_it: ^7.7.0

  # Date formatting
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/